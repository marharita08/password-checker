services:
  mongodb:
    image: mongo:8
    container_name: password-checker-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: password-checker
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
  